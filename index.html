<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UrbanEye · AI Urban Intelligence Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  --bg:#0f1117;--bg-surface:#161b26;--bg-card:#1c2333;
  --border:#2a3347;--border-lt:#313d55;
  --blue:#4f8ef7;--blue-soft:rgba(79,142,247,0.12);
  --teal:#2dd4bf;
  --amber:#f59e0b;--amber-soft:rgba(245,158,11,0.12);
  --red:#f43f5e;--red-soft:rgba(244,63,94,0.12);
  --green:#10b981;--green-soft:rgba(16,185,129,0.12);
  --text-1:#f1f5f9;--text-2:#94a3b8;--text-3:#475569;
  --sidebar-w:320px;--topbar-h:52px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text-1);font-family:'Inter',sans-serif;font-size:13px;display:flex;}
.pixelated { image-rendering: crisp-edges; image-rendering: pixelated; }

/* SIDEBAR */
#sidebar{width:var(--sidebar-w);height:100vh;background:var(--bg-surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:200;}
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
.sb-logo-row{display:flex;align-items:center;gap:10px;margin-bottom:2px;}
.sb-logo-icon{width:32px;height:32px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.sb-logo-name{font-family:'Sora',sans-serif;font-size:17px;font-weight:800;color:var(--text-1);letter-spacing:-0.3px;}
.sb-logo-sub{font-size:10.5px;color:var(--text-3);padding-left:42px;}
.sb-live{display:flex;align-items:center;gap:7px;padding:10px 18px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text-3);}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s ease infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.sb-nav{flex:1;padding:0;overflow-y:auto;}
.nav-sec-lbl{font-size:10px;font-weight:600;color:var(--text-3);letter-spacing:0.8px;text-transform:uppercase;padding:14px 18px 8px;}
.sb-footer{padding:14px 18px;border-top:1px solid var(--border);font-size:11px;color:var(--text-3);line-height:1.7;}
.sb-time{font-size:12px;color:var(--text-2);font-weight:500;}

/* MAIN */
#main{margin-left:var(--sidebar-w);flex:1;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
.topbar{height:var(--topbar-h);background:var(--bg-surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;}
.tb-left{display:flex;align-items:center;gap:20px;}
.search-container{display:flex;align-items:center;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.search-container input{background:transparent;border:none;color:var(--text-1);padding:6px 12px;font-size:12px;width:240px;outline:none;}
.search-container button{background:var(--blue-soft);border:none;color:var(--blue);padding:6px 12px;cursor:pointer;}

#map-container{flex:1;position:relative;overflow:hidden;}
#map{width:100%;height:100%;}
.map-coords-bar{position:absolute;bottom:12px;left:14px;z-index:500;background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:11px;color:var(--text-2);}
.map-status-bar{position:absolute;top:14px;right:14px;z-index:500;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--text-3);min-width:196px;}
.map-status-title{font-size:12px;font-weight:600;color:var(--text-1);margin-bottom:3px;}
.map-status-row{display:flex;justify-content:space-between;gap:12px;}

/* INTEL PANEL */
.panel-sec{padding:14px 18px;border-bottom:1px solid var(--border);}
.det-card{background:var(--bg-card);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:8px;transition:all .2s;}
.det-card.alert{border-left:3px solid var(--red);}
.det-card.warn{border-left:3px solid var(--amber);}
.det-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.det-id{font-size:10px;color:var(--text-3);}
.det-badge{font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:4px;}
.badge-alert{background:var(--red-soft);color:var(--red);}
.badge-warn{background:var(--amber-soft);color:var(--amber);}
.det-title{font-size:12.5px;font-weight:600;color:var(--text-1);margin-bottom:3px;}
.det-coords{font-size:10.5px;color:var(--blue);margin-bottom:8px;}
.det-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--text-3);}

/* AOI TOOLBAR */
.aoi-toolbar{position:absolute;bottom:90px;left:14px;z-index:500;background:var(--bg-surface);border:1px solid var(--border);border-radius:10px;padding:6px;display:flex;flex-direction:column;gap:2px;}
.aoi-btn{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:7px;cursor:pointer;font-size:12px;color:var(--text-2);transition:all .15s;}
.aoi-btn.active{background:rgba(45,212,191,0.12);color:var(--teal);border:1px solid rgba(45,212,191,0.25);}
.aoi-hint{position:absolute;bottom:52px;left:14px;z-index:500;background:rgba(22,27,38,0.95);border:1px solid var(--border);border-radius:7px;padding:7px 12px;font-size:11px;color:var(--text-2);display:none;}
.aoi-hint.show{display:block;}
.aoi-bottom-bar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:500;background:var(--bg-surface);border:1px solid rgba(45,212,191,0.3);border-radius:10px;padding:10px 16px;display:none;align-items:center;gap:14px;}
.aoi-bottom-bar.show{display:flex;}
.aoi-run-btn{background:var(--teal);color:#0f1117;border:none;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;}

/* PROOF UI */
.proof-grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:6px;margin-top:10px;}
.proof-img-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}
.proof-lbl{font-size:9px;color:var(--text-3);text-transform:uppercase;}
.proof-canvas{width:100%;aspect-ratio:1;background:#000;border:1px solid var(--border);border-radius:4px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

@media (max-width: 768px) {
  #sidebar { display: none; }
  #main { margin-left: 0; }
}
</style>
</head>
<body>

<nav id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-row"><div class="sb-logo-icon">🛰️</div><div class="sb-logo-name">UrbanEye</div></div>
    <div class="sb-logo-sub">Optical Construction AI</div>
  </div>
  <div class="sb-live"><div class="live-dot"></div>Sentinel-2 · Active</div>
  <div class="sb-nav">
    <div id="aoi-results-sec" style="display:none;">
      <div class="nav-sec-lbl">Analysis Results</div>
      <div class="panel-sec" id="aoi-results-content"></div>
    </div>
    <div class="nav-sec-lbl">Detected Anomalies</div>
    <div class="panel-sec" id="live-det-list">
      <div style="color:var(--text-3);text-align:center;padding:20px 0;">Draw an area to begin.</div>
    </div>
  </div>
  <div class="sb-footer">
    <div class="sb-time" id="utc-time">--:--:-- UTC</div>
    <div style="margin-top:4px;">
      <div class="proxy-row"><span class="proxy-lbl">Auth: </span><span class="proxy-val" id="auth-status">...</span></div>
    </div>
  </div>
</nav>

<div id="main">
  <div class="topbar">
    <div class="tb-left">
      <div class="search-container">
        <input type="text" id="location-search" placeholder="Search location...">
        <button onclick="executeSearch()">🔍</button>
      </div>
    </div>
    <div class="tb-right">
      <div class="tb-chip warn" id="anomaly-chip">⚠ 0 Anomalies</div>
    </div>
  </div>

  <div id="map-container">
    <div id="map"></div>
    <div class="map-coords-bar" id="map-coords">Lat -- · Lon --</div>
    <div class="map-status-bar">
      <div class="map-status-title">Sentinel-2 L2A</div>
      <div class="map-status-row"><span>Date:</span><span id="img-date">--</span></div>
    </div>
    <div class="aoi-toolbar">
      <div class="aoi-btn" id="aoi-draw-btn" onclick="toggleAOI()">⬚ Draw Inspection Area</div>
    </div>
    <div class="aoi-hint" id="aoi-hint">Click and drag on the map</div>
    <div class="aoi-bottom-bar" id="aoi-bottom-bar">
      <div id="aoi-default-controls" style="display:flex;align-items:center;gap:14px;">
        <span id="aoi-size-val">0 km²</span>
        <select id="time-travel-sel" style="background:#161b26; color:#fff; border:1px solid #2a3347; border-radius:4px;">
          <option value="1">vs 1 Year Ago</option>
          <option value="2">vs 2 Years Ago</option>
        </select>
        <button class="aoi-run-btn" onclick="runRealTimeAnalysis()">🔍 Run AI Scan</button>
        <button onclick="clearAOI()">✕ Clear</button>
      </div>
      <div id="aoi-post-controls" style="display:none; gap:10px;"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* CONFIG */
const CLIENT_ID     = 'sh-fe2985a1-b4fa-4d0e-a0a3-a7601680c54f';
const CLIENT_SECRET = 'ZvAZtxwPNBCfvauai9goUgy4f2yEOh2z';
const CORS_PROXY    = 'https://corsproxy.io/?'; 
const TOKEN_URL     = CORS_PROXY + encodeURIComponent('https://identity.dataspace.copernicus.eu/auth/realms/CDSE/protocol/openid-connect/token');

let token = null, tokenExp = 0, map = null, aoiRect = null, aoiLayer = null;
let overlayBefore = null, overlayAfter = null, realDetections = [], detectionLayerGroup = null;

/* CLOCK */
function tick() { document.getElementById('utc-time').textContent = new Date().toUTCString().split(' ')[4] + ' UTC'; }
setInterval(tick, 1000);

/* AUTH */
async function getToken() {
  if (token && Date.now() < tokenExp) return token;
  try {
    const res = await fetch(TOKEN_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ grant_type: 'client_credentials', client_id: CLIENT_ID, client_secret: CLIENT_SECRET })
    });
    const d = await res.json();
    token = d.access_token;
    tokenExp = Date.now() + (d.expires_in - 60) * 1000;
    document.getElementById('auth-status').textContent = 'Active ✓';
    document.getElementById('img-date').textContent = new Date().toISOString().split('T')[0];
    return token;
  } catch (e) { return null; }
}

/* MAP INIT */
function initMap() {
  map = L.map('map', { center: [40.4093, 49.8671], zoom: 12, zoomControl: false });
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
  map.on('mousemove', e => { document.getElementById('map-coords').textContent = `Lat ${e.latlng.lat.toFixed(4)} · Lon ${e.latlng.lng.toFixed(4)}`; });
  detectionLayerGroup = L.layerGroup().addTo(map);
}

/* AOI DRAWING */
let aoiMode = false, drawStart = null;
function toggleAOI() {
  aoiMode = !aoiMode;
  if (aoiMode) {
    document.getElementById('aoi-draw-btn').classList.add('active');
    document.getElementById('aoi-hint').classList.add('show');
    map.dragging.disable();
    map.on('mousedown', e => {
      drawStart = e.latlng;
      map.on('mousemove', m => {
        if (aoiLayer) map.removeLayer(aoiLayer);
        aoiLayer = L.rectangle(L.latLngBounds(drawStart, m.latlng), { color: '#2dd4bf', weight: 2 }).addTo(map);
      });
      map.on('mouseup', () => {
        map.off('mousemove');
        aoiRect = { bounds: aoiLayer.getBounds(), sw: aoiLayer.getBounds().getSouthWest(), ne: aoiLayer.getBounds().getNorthEast() };
        document.getElementById('aoi-bottom-bar').classList.add('show');
        document.getElementById('aoi-size-val').textContent = 'Area Ready';
        toggleAOI();
      });
    });
  } else {
    document.getElementById('aoi-draw-btn').classList.remove('active');
    document.getElementById('aoi-hint').classList.remove('show');
    map.dragging.enable();
    map.off('mousedown');
  }
}

function clearAOI() {
  if (aoiLayer) map.removeLayer(aoiLayer);
  if (overlayBefore) map.removeLayer(overlayBefore);
  if (overlayAfter) map.removeLayer(overlayAfter);
  detectionLayerGroup.clearLayers();
  document.getElementById('aoi-bottom-bar').classList.remove('show');
  document.getElementById('aoi-results-sec').style.display = 'none';
}

/* API CALLS */
async function fetchProcessAPI(bounds, fromDate, toDate, token, pxWidth, pxHeight) {
  const payload = {
    input: { bounds: { bbox: [bounds.getWest(), bounds.getSouth(), bounds.getEast(), bounds.getNorth()] },
      data: [{ type: "sentinel-2-l2a", dataFilter: { timeRange: { from: `${fromDate}T00:00:00Z`, to: `${toDate}T23:59:59Z` }, maxCloudCoverage: 20 }}]
    },
    output: { width: pxWidth, height: pxHeight, responses: [{ identifier: "default", format: { type: "image/png" } }] },
    evalscript: `//VERSION=3\nfunction setup() { return { input: ["B04", "B03", "B02", "dataMask"], output: { bands: 4 } }; }\nfunction evaluatePixel(sample) { return [sample.B04*2.5, sample.B03*2.5, sample.B02*2.5, sample.dataMask]; }`
  };
  const res = await fetch("https://sh.dataspace.copernicus.eu/api/v1/process", {
    method: "POST", headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  return URL.createObjectURL(await res.blob());
}

async function runRealTimeAnalysis() {
  if (!aoiRect) return;
  const list = document.getElementById('live-det-list');
  document.getElementById('aoi-results-sec').style.display = 'block';
  list.innerHTML = 'Connecting to AI...';

  const tok = await getToken();
  try {
    const pxWidth = 800, pxHeight = 800;
    const now = new Date();
    const history = new Date(now.getTime() - 365 * 86400000);
    
    const [urlB, urlA] = await Promise.all([
      fetchProcessAPI(aoiRect.bounds, new Date(history.getTime()-30*86400000).toISOString().split('T')[0], history.toISOString().split('T')[0], tok, pxWidth, pxHeight),
      fetchProcessAPI(aoiRect.bounds, new Date(now.getTime()-30*86400000).toISOString().split('T')[0], now.toISOString().split('T')[0], tok, pxWidth, pxHeight)
    ]);

    overlayBefore = L.imageOverlay(urlB, aoiRect.bounds).addTo(map);
    overlayAfter = L.imageOverlay(urlA, aoiRect.bounds).addTo(map);

    // AI API CALL
    const AI_API_URL = "https://nonexperientially-nonconsistorial-huey.ngrok-free.dev/analyze"; 

    const aiRes = await fetch(AI_API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", "ngrok-skip-browser-warning": "true" },
      body: JSON.stringify({ bounds: { north: aoiRect.ne.lat, south: aoiRect.sw.lat, east: aoiRect.ne.lng, west: aoiRect.sw.lng } })
    });

    const result = await aiRes.json();
    realDetections = result.detections || [];
    plotDetections();
  } catch (err) { list.innerHTML = 'Error: ' + err.message; }
}

function plotDetections() {
  const list = document.getElementById('live-det-list');
  list.innerHTML = '';
  detectionLayerGroup.clearLayers();
  realDetections.forEach(d => {
    L.circleMarker([d.lat, d.lng], { color: 'red', radius: 5 }).addTo(detectionLayerGroup);
    list.innerHTML += `<div class="det-card alert"><b>${d.label}</b><br>${d.conf}% Conf</div>`;
  });
}

document.addEventListener('DOMContentLoaded', () => { initMap(); getToken(); });
</script>
</body>
</html>
